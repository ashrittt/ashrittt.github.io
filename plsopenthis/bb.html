<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You ❤️</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: 'Arial', sans-serif;
    }
    .container {
      text-align: center;
    }
    h1 {
      color: #fff;
      font-size: 2em;
    }
    button {
      padding: 15px 25px;
      font-size: 1.2em;
      border: none;
      border-radius: 10px;
      background-color: #ff6f91;
      color: white;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    button:hover {
      transform: scale(1.1);
      background-color: #ff4f6d;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Click to open your surprise 💌</h1>
    <button onclick="location.href='surprise.html'">Open</button>
  </div>
</body>
</html>
