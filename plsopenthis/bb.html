<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Present 🎁</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #fad0c4;
            font-family: 'Arial', sans-serif;
            text-align: center;
        }

        .present {
            width: 120px;
            height: 120px;
            background: #ff6f91;
            position: relative;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease;
        }

        /* Ribbons */
        .present::before,
        .present::after {
            content: "";
            position: absolute;
            background: #fff;
        }

        .present::before {
            width: 20px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
        }

        .present::after {
            height: 20px;
            width: 100%;
            top: 50%;
            transform: translateY(-50%);
        }

        /* Bow */
        .bow {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2em;
        }

        /* Bottom text */
        .caption {
            margin-top: 15px;
            font-size: 1.2em;
            color: #333;
        }

        /* Button */
        .open-btn {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            background-color: #ff4f6d;
            color: white;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .open-btn:hover {
            transform: scale(1.1);
            background-color: #e63e5a;
        }

        /* Shake animation */
        @keyframes shake {
            0% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(5deg);
            }

            50% {
                transform: rotate(-5deg);
            }

            75% {
                transform: rotate(5deg);
            }

            100% {
                transform: rotate(0deg);
            }
        }

        .shake {
            animation: shake 0.6s ease;
        }
    </style>
</head>

<body>
    <div class="present" onclick="openPresent()">
        <div class="bow">🎀</div>
    </div>

    <div class="caption">Click to open your surprise 💌</div>

    <script>
        function openPresent() {
            const box = document.querySelector('.present');
            box.classList.add('shake');
            setTimeout(() => {
                window.location.href = 'surprise.html';
            }, 800);
        }
    </script>
</body>

</html>
