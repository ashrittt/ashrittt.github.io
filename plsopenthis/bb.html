<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Present 🎁</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: 'Arial', sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 15px;
    }

    .present {
      width: 150px;
      height: 150px;
      background: #ff6f91;
      position: relative;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.25);
    }

    /* Vertical ribbon */
    .present::before {
      content: "";
      position: absolute;
      width: 20px;
      height: 100%;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      background: #fff;
      border-radius: 5px;
    }

    /* Horizontal ribbon */
    .present::after {
      content: "";
      position: absolute;
      height: 20px;
      width: 100%;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      background: #fff;
      border-radius: 5px;
    }

    /* Bow */
    .bow {
      position: absolute;
      top: -35px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2.5em;
    }

    /* Caption text */
    .caption {
      font-size: 1.2em;
      color: #333;
    }

    /* Shake animation */
    @keyframes shake {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(5deg); }
      50% { transform: rotate(-5deg); }
      75% { transform: rotate(5deg); }
      100% { transform: rotate(0deg); }
    }

    .shake {
      animation: shake 0.6s ease;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="present" onclick="openPresent()">
      <div class="bow">🎀</div>
    </div>
    <div class="caption">Click to open your surprise 💌</div>
  </div>

  <script>
    function openPresent() {
      const box = document.querySelector('.present');
      box.classList.add('shake');
      setTimeout(() => {
        window.location.href = 'surprise.html';
      }, 800);
    }
  </script>
</body>

</html>
