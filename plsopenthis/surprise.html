<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Love Letter</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
            font-family: 'Georgia', serif;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .letter {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h2 {
            color: #ff6f91;
            margin: 0;
        }

        p {
            font-size: 1.1em;
            line-height: 1.6;
            margin: 0;
        }

        /* Next button styling */
        .next-btn {
            padding: 10px 20px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            background-color: #ff6f91;
            color: white;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .next-btn:hover {
            transform: scale(1.1);
            background-color: #e63e5a;
        }
    </style>
</head>

<body>
    <div class="letter">
        <h2>PREEEEEEEEEEEE WASSSAAAAP</h2>
        <p>
            musta pareng nico? natuloy long quiz sa math noh?
            hayppp, kaya yan! pasado yan! go go lang! atlis
            masarap ulam kanina!! HSHAHHSAHSAHSHADHHDASHDASH
        </p>
        <button class="next-btn" onclick="goNext()">Next ➡️</button>
    </div>

    <script>
        function goNext() {
            window.location.href = 'next.html'; // change to your next page
        }
    </script>
</body>

</html>
